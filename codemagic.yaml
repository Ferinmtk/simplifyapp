workflows:
  ios-debug-build:
    name: iOS Debug Build (Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      java: 21
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "WP_USERNAME=" >> local.properties
          echo "WP_PASSWORD=" >> local.properties
          echo "GOOGLE_WEB_CLIENT_ID=" >> local.properties

      - name: Make gradlew executable
        script: |
          chmod +x ./gradlew

      - name: Build iOS app (unsigned, for simulator)
        script: |
          set -eox pipefail
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee ../xcodebuild.log

      - name: Package app for Appetize
        script: |
          set -eox pipefail
          APP_PATH=$(find iosApp/build/Build/Products/Debug-iphonesimulator -name "*.app" -maxdepth 1 | head -1)
          echo "Found app at: $APP_PATH"
          # Verify Info.plist exists
          ls "$APP_PATH/Info.plist"
          # Zip correctly — Appetize needs the .app at root of zip
          cd "$(dirname "$APP_PATH")"
          zip -r ~/SimplifyBiz.app.zip "$(basename "$APP_PATH")"
          echo "Packaged successfully"

    artifacts:
      - ~/SimplifyBiz.app.zip
      - iosApp/build/Build/Products/Debug-iphonesimulator/*.app
      - xcodebuild.log
